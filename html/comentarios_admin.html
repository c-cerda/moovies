<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Moderación de Comentarios</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .admin-search-bar {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid var(--celeste-suave);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .no-results {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body class="admin-body">
    <header>
        <a href="admin.html" style="color:white; text-decoration:none; margin-left:20px;">← Volver al Menú</a>
        <h2 style="margin:0 auto;">Moderación de Comentarios</h2>
    </header>

    <main class="admin-container" style="padding: 20px;">
        <section>
            <h3>Filtro de Búsqueda</h3>
            <input type="text" id="adminCommentSearch" class="admin-search-bar" 
                   placeholder="Buscar por nombre de película o nombre de usuario...">
        </section>

        <section class="admin-table-wrapper">
            <table class="admin-table" style="width:100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: var(--azul-fuerte); color:white;">
                        <th>Usuario</th>
                        <th>Película</th>
                        <th>Comentario</th>
                        <th>Calificación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaComentariosBody">
                    </tbody>
            </table>
            <div id="noResultsMsg" class="no-results" style="display:none;">
                No se encontraron comentarios que coincidan con la búsqueda.
            </div>
        </section>
    </main>

    <script src="../js/seed-data.js"></script>
    <script src="../js/storage.js"></script>
    <script>
   let allComments = [];

async function inicializarAdmin() {
    await cargarComentarios();

    // Buscador en tiempo real
    document.getElementById('adminCommentSearch').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const filtered = allComments.filter(c => 
            c.movie_title.toLowerCase().includes(term) || 
            c.username.toLowerCase().includes(term)
        );
        renderTable(filtered);
    });
}

async function cargarComentarios() {
    const res = await fetch('../api/list_comments.php');
    allComments = await res.json();
    renderTable(allComments);
}

function renderTable(data) {
    const tbody = document.getElementById('tablaComentariosBody');
    const noResults = document.getElementById('noResultsMsg');
    tbody.innerHTML = '';

    if (data.length === 0) {
        noResults.style.display = 'block';
        return;
    }
    noResults.style.display = 'none';

    data.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="font-weight:bold; color:var(--azul-fuerte);">${c.username}</td>
            <td style="color:#555;">${c.movie_title}</td>
            <td style="max-width:300px; font-style:italic;">"${c.comment}"</td>
            <td style="text-align:center; font-size: 1.2rem;">
                ${'🥛'.repeat(c.rating)}${'<span style="opacity:0.2">🥛</span>'.repeat(5 - c.rating)}
            </td>
            <td>
                <button class="btn-moo" style="background:#cc0000; border:none; cursor:pointer;" 
                        onclick="eliminarComentario(${c.id})">Eliminar</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

async function eliminarComentario(id) {
    if(confirm('¿Eliminar este comentario permanentemente?')) {
        const res = await fetch(`../api/delete_comment.php?id=${id}`, { method: 'GET' });
        const result = await res.json();
        if(result.success) {
            cargarComentarios();
        } else {
            alert("Error al eliminar");
        }
    }
}

window.onload = inicializarAdmin;
    </script>
</body>
</html>
