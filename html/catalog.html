<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MOOVIES - Catálogo</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
    <header>
        <a href="#" class="header-logo">
            <img src="../MOO/MOOVIES_icon.png" alt="Logo">
        </a>
        <div class="user-menu">
            <div class="user-info" onclick="toggleMenu()">Hola, Cineasta Lechero ▼</div>
            <div id="logoutMenu" class="dropdown-content">
                <a href="#" onclick="logout(event)">Cerrar Sesión</a>
            </div>
        </div>
    </header>

    <main class="catalog-content">
        <h2 style="margin-top: 10px;">CARTELERA DESTACADA</h2>
        
        <div class="movie-grid">
            
            <div class="movie-card">
                <img src="https://visualprint-store.com/cdn/shop/files/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg?v=1726249921&width=1946" alt="Interstelar">
                <div class="movie-info">
                    <h4>Interstelar</h4>
                    <p style="color: #666; font-size: 0.9rem;">Un viaje más allá de la galaxia láctea.</p>
                    
                    <div class="opinion-box">
                        <p style="font-weight: bold; margin: 0 0 10px 0;">¿Qué te pareció?</p>
                        <button class="btn-opinar" onclick="openModal('Interstelar', 'Un grupo de exploradores viaja a través de un agujero de gusano.', 'https://visualprint-store.com/cdn/shop/files/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg?v=1726249921&width=1946')">
                            ✨ ¡Quiero opinar! 🥛
                        </button>
                    </div>
                </div>
            </div>

            <div class="movie-card">
                <img src="https://moviepostermexico.com/cdn/shop/products/wolf_of_wall_street_ver4_1200x1200.jpg?v=1612284699" alt="Lobo de Wall Street">
                <div class="movie-info">
                    <h4>Lobo de Wall Street</h4>
                    <p style="color: #666; font-size: 0.9rem;">Negocios y mucho drama.</p>
                    
                    <div class="opinion-box">
                        <p style="font-weight: bold; margin: 0 0 10px 0;">¿Qué te pareció?</p>
                        <button class="btn-opinar" onclick="openModal('Lobo de Wall Street', 'La ambición no tiene límites.', 'https://moviepostermexico.com/cdn/shop/products/wolf_of_wall_street_ver4_1200x1200.jpg?v=1612284699')">
                            ✨ ¡Quiero opinar! 🥛
                        </button>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalImg" src="" alt="Poster">
                </div>
                <div class="modal-details">
                    <h2 id="modalTitle">Título</h2>
                    <p id="modalSynopsis" style="font-size: 1.1rem; color: #444;">Sinopsis...</p>
                    <hr>
                    <h3>Tu Calificación</h3>
                    <div class="milk-rating">
                        <span class="glass" onclick="setRating(1)">🥛</span>
                        <span class="glass" onclick="setRating(2)">🥛</span>
                        <span class="glass" onclick="setRating(3)">🥛</span>
                        <span class="glass" onclick="setRating(4)">🥛</span>
                        <span class="glass" onclick="setRating(5)">🥛</span>
                    </div>
                    <textarea id="reviewText" placeholder="Escribe aquí tu reseña lechera..."></textarea>
                    <button class="btn-send" onclick="sendReview()">Enviar Reseña</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../JavaScript/script.js"></script>
</body>
</html>
