<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>MOOVIES - Catálogo</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
	<header>
		<a href="index.html" class="header-logo">
			<img src="../images/MOOVIES_icon.png" alt="Logo">
		</a>
		<div class="user-menu">
			<div class="user-info" id="userGreeting" onclick="toggleMenu()">Hola, Cineasta ▼</div>
			<div id="logoutMenu" class="dropdown-content">
				<a href="#" onclick="openMyProfile(event)">Ver perfil</a>
				<a href="#" onclick="logout(event)">Cerrar sesión</a>
			</div>
		</div>
	</header>

	<main class="catalog-content">
		<h2 class="catalog-title">CARTELERA DESTACADA</h2>
		<div class="catalog-toolbar">
			<label class="sr-only" for="searchMovies">Buscar películas</label>
			<input type="search" id="searchMovies" class="catalog-search"
				placeholder="Buscar por título, género o reparto…" autocomplete="off">
			<label class="sr-only" for="filterGenre">Filtrar por género</label>
			<select id="filterGenre" class="catalog-genre" aria-label="Género">
				<option value="">Todos los géneros</option>
			</select>
		</div>
		<p id="catalogLoadError" class="catalog-error" hidden></p>
		<div id="movie-grid" class="movie-grid" aria-live="polite"></div>
	</main>

	<script src="../js/api.js"></script>
	<script src="../js/catalog.js"></script>
</body>

</html>
