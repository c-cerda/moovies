<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOVIES - Panel Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .admin-menu-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 50px 20px;
            min-height: 70vh;
        }
        .admin-circle-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-color: var(--azul-fuerte);
            color: white;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 4px solid var(--celeste-suave);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .admin-circle-btn:hover {
            transform: scale(1.1);
            background-color: #0044cc;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .admin-circle-btn span {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <a href="catalog.html" class="header-logo">
            <img src="../images/MOOVIES_icon.png" alt="Logo">
        </a>
        <div class="user-info">Administrador</div>
    </header>

    <main>
        <h1 style="text-align: center; margin-top: 40px; color: var(--azul-fuerte);">Panel de Control General</h1>
        <div class="admin-menu-container">
            <a href="peliculas_admin.html" class="admin-circle-btn">
                <span>🎬</span> Películas
            </a>
            <a href="usuarios_admin.html" class="admin-circle-btn">
                <span>👤</span> Usuarios
            </a>
            <a href="cast_admin.html" class="admin-circle-btn">
                <span>🌟</span> Elenco/Cast
            </a>
            <a href="comentarios_admin.html" class="admin-circle-btn">
                <span>💬</span> Comentarios
            </a>
        </div>
    </main>
</body>
</html>
