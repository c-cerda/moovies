<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Moovies - Registro</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
	<div class="auth-wrapper">
		<div class="auth-container">
			<div class="auth-form">
				<h2>Crea tu Perfil</h2>
				<form action="catalog.html">
					<input type="text" placeholder="Nombre de usuario (ej. MooCine)" required>
					<input type="email" placeholder="Correo electrónico" required>
					<select>
						<option>Leche Favorita: Entera</option>
						<option>Leche Favorita: Deslactosada</option>
						<option>Leche Favorita: Almendra</option>
					</select>
					<input type="password" placeholder="Contraseña" required>
					<button type="submit" class="btn-moo">¡Muu-gistrarse!</button>
				</form>
				<p style="text-align:center; margin-top:20px;">
					¿Ya tienes cuenta? <a href="login.html"
						style="color:var(--azul-fuerte); font-weight:bold;">Inicia sesión</a>
				</p>
			</div>
			<div class="auth-image">
				<img src="../moo/MOOVIES_LOGO.png" alt="Logo">

			</div>
		</div>
	</div>
</body>

</html>
