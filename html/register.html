<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Moovies - Registro</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
	<div class="auth-wrapper">
		<div class="auth-container">
			<div class="auth-form">
				<h2>Crea tu Perfil</h2>
				<p id="authMessage" class="auth-message" hidden></p>
				<form id="registerForm" novalidate>
					<input type="text" id="regNombreUsuario" name="nombreUsuario"
						placeholder="Nombre de usuario (único, ej. moo_cine)" required
						autocomplete="username" pattern="[a-zA-Z0-9_-]{3,24}"
						title="Letras, números, guiones y guión bajo. 3 a 24 caracteres.">
					<input type="text" id="regNombre" name="nombre"
						placeholder="Nombre para mostrar" required>
					<input type="email" id="regEmail" name="email" placeholder="Correo electrónico"
						required autocomplete="email">
					<select id="regLeche" name="leche" aria-label="Leche favorita">
						<option value="Entera">Leche favorita: Entera</option>
						<option value="Deslactosada">Leche favorita: Deslactosada</option>
						<option value="Almendra">Leche favorita: Almendra</option>
					</select>
					<input type="password" id="regPassword" name="password" placeholder="Contraseña"
						required autocomplete="new-password" minlength="4">
					<button type="submit" class="btn-moo">¡Muu-gistrarse!</button>
				</form>
				<p style="text-align:center; margin-top:20px;">
					¿Ya tienes cuenta? <a href="login.html"
						style="color:var(--azul-fuerte); font-weight:bold;">Inicia sesión</a>
				</p>
			</div>
			<div class="auth-image">
				<img src="../images/MOOVIES_LOGO.png" alt="Logo">
			</div>
		</div>
	</div>

	<script>
		document.getElementById('registerForm').addEventListener('submit', async function (e) {
			e.preventDefault();

			const msg = document.getElementById('authMessage');
			msg.hidden = true;

			const data = {
				username: document.getElementById('regNombreUsuario').value.trim(),
				name: document.getElementById('regNombre').value.trim(),
				email: document.getElementById('regEmail').value.trim(),
				milk: document.getElementById('regLeche').value,
				password: document.getElementById('regPassword').value
			};

			console.log(data);

			try {
				const res = await fetch('../api/register.php', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify(data)
				});

				const result = await res.json();
				console.log(result);
				if (result.success) {
					window.location.href = 'login.html';
				} else {
					msg.textContent = result.message;
					msg.hidden = false;
				}
			} catch (err) {
				msg.textContent = 'Error de conexión con el servidor';
				msg.hidden = false;
			}
		});
	</script>
</body>

</html>
