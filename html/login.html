<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Moovies - Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-image">
                <img src="../images/MOOVIES_LOGO.png" alt="Logo">
            </div>
            <div class="auth-form">
                <h2>Iniciar Sesión</h2>
                <p id="authMessage" class="auth-message" hidden></p>
                <form id="loginForm" novalidate>
                    <input type="text" id="loginEmail" name="loginId" placeholder="Correo o nombre de usuario"
                        required autocomplete="username" spellcheck="false">
                    <input type="password" id="loginPassword" name="password"
                        placeholder="Tu contraseña" required autocomplete="current-password">
                    <button type="submit" class="btn-moo">Entrar</button>
                </form>
                <p style="text-align:center; margin-top:20px;">
                    ¿Eres nuevo? <a href="register.html"
                        style="color:var(--azul-fuerte); font-weight:bold;">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/seed-data.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        (function () {
            var form = document.getElementById('loginForm');
            var msg = document.getElementById('authMessage');

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                msg.hidden = true;

                var loginId = document.getElementById('loginEmail').value.trim();
                var password = document.getElementById('loginPassword').value;

                MooviesStorage.ensureLocalJsonSeed().then(function () {
                    var users = MooviesStorage.getUsers();
                    var found = null;
                    var idLower = loginId.toLowerCase();

                    // 1. Buscar el usuario en la base de datos local
                    for (var i = 0; i < users.length; i++) {
                        var u = users[i];
                        var mail = u.email ? String(u.email).toLowerCase() : '';
                        var nu = u.nombreUsuario ? String(u.nombreUsuario).toLowerCase() : '';

                        if (u.password === password && (idLower === mail || idLower === nu)) {
                            found = u;
                            break;
                        }
                    }

                    if (found) {
                        // 2. Guardar la sesión del usuario encontrado
                        MooviesStorage.setSessionUser({
                            nombreUsuario: found.nombreUsuario || found.nombre,
                            nombre: found.nombre || found.nombreUsuario,
                            email: found.email,
                        });

                        // 3. Lógica de redirección diferenciada
                        // Verificamos si es el administrador (ajusta 'admin' por el nombre real de tu usuario admin)
                        if (found.nombreUsuario.toLowerCase() === 'admin' || found.email.toLowerCase() === 'admin@moovies.com') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'catalog.html';
                        }
                        return;
                    }

                    // Si no se encuentra el usuario
                    msg.textContent = 'Usuario / correo o contraseña incorrectos';
                    msg.hidden = false;
                });
            });
        })();
    </script>
</body>

</html>
