<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Moovies - Iniciar Sesión</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
	<div class="auth-wrapper">
		<div class="auth-container">
			<div class="auth-image">
				<img src="../images/MOOVIES_LOGO.png" alt="Logo">
			</div>
			<div class="auth-form">
				<h2>Iniciar Sesión</h2>
				<p id="authMessage" class="auth-message" hidden></p>
				<form id="loginForm" novalidate>
					<input type="email" id="loginEmail" name="email" placeholder="Correo de la vaca"
						required autocomplete="username">
					<input type="password" id="loginPassword" name="password"
						placeholder="Tu contraseña" required autocomplete="current-password">
					<button type="submit" class="btn-moo">Entrar</button>
				</form>
				<p style="text-align:center; margin-top:20px;">
					¿Eres nuevo? <a href="register.html"
						style="color:var(--azul-fuerte); font-weight:bold;">Regístrate aquí</a>
				</p>
			</div>
		</div>
	</div>

	<script>
		document.getElementById('loginForm').addEventListener('submit', async function (e) {
			e.preventDefault();
			const msg = document.getElementById('authMessage');
			msg.hidden = true;

			const data = {
				email: document.getElementById('loginEmail').value.trim(),
				password: document.getElementById('loginPassword').value
			};

			try {
				const res = await fetch('../api/login.php', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify(data)
				});

				const result = await res.json();
				console.log(result);
				if (result.success) {
					window.location.href = 'catalog.html';
				} else {
					msg.textContent = result.message;
					msg.hidden = false;
				}

			} catch (err) {
				msg.textContent = 'Error de conexión con el servidor';
				msg.hidden = false;
			}

		});
	</script>
</body>

</html>
