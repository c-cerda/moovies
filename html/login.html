<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Moovies - Iniciar Sesión</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
	<div class="auth-wrapper">
		<div class="auth-container">
			<div class="auth-image">
				<img src="../moo/MOOVIES_LOGO.png" alt="Logo">
			</div>
			<div class="auth-form">
				<h2>Iniciar Sesión</h2>
				<form action="catalog.html">
					<input type="email" placeholder="Correo de la vaca" required>
					<input type="password" placeholder="Tu contraseña" required>
					<button type="submit" class="btn-moo">Entrar a Pastar</button>
				</form>
				<p style="text-align:center; margin-top:20px;">
					¿Eres nuevo? <a href="register.html"
						style="color:var(--azul-fuerte); font-weight:bold;">Regístrate aquí</a>
				</p>
			</div>
		</div>
	</div>
</body>

</html>
