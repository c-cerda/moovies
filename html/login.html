<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Moovies - Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-image">
                <img src="../moo/MOOVIES_LOGO.png" alt="Logo">
            </div>
            <div class="auth-form">
                <h2>Iniciar Sesión</h2>
                <p id="authMessage" class="auth-message" hidden></p>
                <form id="loginForm" novalidate>
                    <input type="email" id="loginEmail" name="email" placeholder="Correo de la vaca" required autocomplete="username">
                    <input type="password" id="loginPassword" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
                    <button type="submit" class="btn-moo">Entrar a Pastar</button>
                </form>
                <p style="text-align:center; margin-top:20px;">
                    ¿Eres nuevo? <a href="register.html" style="color:var(--azul-fuerte); font-weight:bold;">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
    <script src="../js/seed-data.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        (function () {
            var form = document.getElementById('loginForm');
            var msg = document.getElementById('authMessage');
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                msg.hidden = true;
                var email = document.getElementById('loginEmail').value.trim();
                var password = document.getElementById('loginPassword').value;
                MooviesStorage.ensureLocalJsonSeed().then(function () {
                    var users = MooviesStorage.getUsers();
                    var found = null;
                    for (var i = 0; i < users.length; i++) {
                        var u = users[i];
                        if (
                            u.email &&
                            u.email.toLowerCase() === email.toLowerCase() &&
                            u.password === password
                        ) {
                            found = u;
                            break;
                        }
                    }
                    if (found) {
                        MooviesStorage.setSessionUser({
                            nombreUsuario: found.nombreUsuario || found.nombre,
                            nombre: found.nombre || found.nombreUsuario,
                            email: found.email,
                        });
                        window.location.href = 'catalog.html';
                        return;
                    }
                    msg.textContent = 'Correo o contraseña incorrectos';
                    msg.hidden = false;
                });
            });
        })();
    </script>
</body>
</html>
