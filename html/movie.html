<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>MOOVIES - Película</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
	<header class="btn-back">
		<a href=" catalog.html">⬅ Volver</a>
	</header>

	<div class="modal-content modal-content--wide">
		<div class="modal-body modal-body--columns">

			<!-- LEFT COLUMN -->
			<div class="modal-image modal-image--stacked">
				<img id="modalImg" src="" alt="Poster">

				<a id="modalTrailerBtn" class="btn-trailer" target="_blank">
					VER TRAILER
				</a>

				<dl class="modal-meta modal-meta--under-poster">
					<div>
						<dt>Director</dt>
						<dd id="modalDirector"></dd>
					</div>
					<div>
						<dt>Compositor</dt>
						<dd id="modalCompositor"></dd>
					</div>
					<div>
						<dt>Guionistas</dt>
						<dd id="modalGuionistas"></dd>
					</div>
					<div>
						<dt>Actores principales</dt>
						<dd id="modalActores"></dd>
					</div>
				</dl>
			</div>

			<!-- CENTER COLUMN -->
			<div class="modal-review-column">
				<h2 id="modalTitle"></h2>
				<p id="modalGenre" class="modal-genre"></p>

				<h3 class="modal-subheading">Sinopsis</h3>
				<textarea id="modalSynopsis"
					class="modal-synopsis-area modal-synopsis-area--above-review"
					readonly></textarea>

				<!-- REVIEW BOX -->
				<div class="modal-review-box">
					<h3 class="modal-subheading">Tu calificación</h3>

					<div class="milk-rating" id="milkRatingRow">
						<span class="glass" onclick="setRating(1)">🥛</span>
						<span class="glass" onclick="setRating(2)">🥛</span>
						<span class="glass" onclick="setRating(3)">🥛</span>
						<span class="glass" onclick="setRating(4)">🥛</span>
						<span class="glass" onclick="setRating(5)">🥛</span>
					</div>

					<textarea id="reviewText" class="review-textarea"
						placeholder="Escribe tu reseña..."></textarea>

					<button class="btn-send" onclick="sendReview()">
						Enviar reseña
					</button>
				</div>
			</div>

			<!-- RIGHT COLUMN -->
			<aside class="modal-comments-column">
				<h3 class="comments-heading">Comentarios</h3>
				<div id="commentsList" class="comments-list"></div>
			</aside>

		</div>
	</div>
	</div>

	<script src="../js/api.js"></script>
	<script src="../js/movie.js"></script>

</body>

</html>
