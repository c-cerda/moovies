<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Elenco</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-body">
    <header>
        <a href="admin.html" style="color:white; text-decoration:none; margin-left:20px;">← Volver</a>
        <h2 style="margin:0 auto;">Gestión de Elenco</h2>
    </header>

    <main class="admin-container" style="padding: 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Actores y Reparto</h3>
            <button class="btn-moo" onclick="abrirModalCast()">Registrar Nuevo Actor</button>
        </div>

        <table class="admin-table" style="width:100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="background: var(--azul-fuerte); color:white;">
                    <th>Persona</th>
                    <th>Película Asociada</th>
                    <th>Rol / Puesto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCastBody"></tbody>
        </table>
    </main>

    <div id="modalCast" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="tituloModalCast">Vincular Reparto</h3>
            <form id="formCast">
                <div class="form-group">
                    <label>Película</label>
                    <select id="selectMovie" required>
                        <option value="">Selecciona película</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Persona</label>
                    <select id="selectPerson" required>
                        <option value="">Selecciona persona</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Rol / Puesto</label>
                    <select id="selectRole" required>
                        <option value="">Selecciona rol</option>
                    </select>
                </div>

                <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="cerrarModalCast()" style="padding:10px; cursor:pointer;">Cancelar</button>
                    <button type="submit" class="btn-moo" style="padding:10px 20px;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let editMode = false;
        let currentData = { movie_id: null, person_id: null, role_id: null };

        // 1. CARGAR TABLA PRINCIPAL
        async function cargarTablaCast() {
            try {
                const response = await fetch('../api/list_cast.php');
                const cast = await response.json();
                const tbody = document.getElementById('tablaCastBody');
                tbody.innerHTML = '';

                cast.forEach(item => {
                    const tr = document.createElement('tr');
                    const esDirector = (parseInt(item.role_id) === 2);

                    const acciones = esDirector
                        ? `<span title="Gestionar desde vista Películas" style="color:gray;">🔒 Director</span>`
                        : `
                        <button onclick="abrirModalCast('${item.movie_id}', '${item.person_id}', '${item.role_id}')" style="cursor:pointer; background:none; border:none;">✏️</button>
                        <button onclick="eliminarVinculo('${item.movie_id}', '${item.person_id}')" style="cursor:pointer; background:none; border:none;">🗑️</button>
                    `;

                    tr.innerHTML = `
                        <td>${item.person_name}</td>
                        <td>${item.movie_title}</td>
                        <td><span class="badge-rol">${item.role_name}</span></td>
                        <td>${acciones}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error al cargar tabla:", error);
            }
        }

        // 2. CARGAR SELECTS (AUXILIARES)
    async function cargarAuxiliaresCast() {
    try {
        const [resMovies, resPeople, resRoles] = await Promise.all([
            fetch('../api/list_movie.php'),
            fetch('../api/list_people.php'),
            fetch('../api/list_roles.php')
        ]);

        const movies = await resMovies.json();
        const people = await resPeople.json();
        const roles = await resRoles.json();

        // 1. Llenar Películas
        document.getElementById('selectMovie').innerHTML = '<option value="">Selecciona película</option>' + 
            movies.map(m => `<option value="${m.id}">${m.title}</option>`).join('');
        
        // 2. Llenar Personas
        document.getElementById('selectPerson').innerHTML = '<option value="">Selecciona persona</option>' + 
            people.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        
        // 3. Llenar Roles (FILTRANDO AL DIRECTOR)
        // Usamos parseInt para asegurar que la comparación con el ID 2 sea correcta
        const rolesSinDirector = roles.filter(r => parseInt(r.id) !== 2);

        document.getElementById('selectRole').innerHTML = '<option value="">Selecciona rol</option>' + 
            rolesSinDirector.map(r => `<option value="${r.id}">${r.name}</option>`).join('');

    } catch (error) {
        console.error("Error al cargar auxiliares:", error);
    }
}

        // 3. ABRIR Y CERRAR MODAL
     async function abrirModalCast(movie_id = null, person_id = null, role_id = null) {
    const modal = document.getElementById('modalCast');
    const titulo = document.getElementById('tituloModalCast');
    modal.style.display = 'block';

    // 1. Forzamos la carga de los selects y esperamos a que termine
    await cargarAuxiliaresCast();

    if (movie_id && person_id) {
        editMode = true;
        // Guardamos los datos actuales para el UPDATE
        currentData = { movie_id, person_id, role_id };
        titulo.innerText = "Editar Vínculo de Elenco";

        // 2. Asignamos valores. Si el select de persona sigue vacío, 
        // verifica que 'person_id' sea el nombre correcto en tu API.
        document.getElementById('selectMovie').value = movie_id;
        document.getElementById('selectPerson').value = person_id;
        document.getElementById('selectRole').value = role_id;

        // Bloqueamos para evitar cambiar la llave primaria accidentalmente
        document.getElementById('selectMovie').disabled = true;
        document.getElementById('selectPerson').disabled = true;
    } else {
        editMode = false;
        titulo.innerText = "Vincular Persona a Película";
        document.getElementById('formCast').reset();
        document.getElementById('selectMovie').disabled = false;
        document.getElementById('selectPerson').disabled = false;
    }
}

        function cerrarModalCast() {
            document.getElementById('modalCast').style.display = 'none';
        }

        // 4. GUARDAR (INSERT O UPDATE)
        document.getElementById('formCast').onsubmit = async (e) => {
            e.preventDefault();
            
            // Si está disabled, el .value no se envía en FormData, así que usamos currentData
            const data = {
                movie_id: document.getElementById('selectMovie').value || currentData.movie_id,
                person_id: document.getElementById('selectPerson').value || currentData.person_id,
                role_id: document.getElementById('selectRole').value
            };

            const url = editMode ? '../api/update_cast.php' : '../api/save_cast.php';

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.status === "success") {
                    cerrarModalCast();
                    cargarTablaCast();
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                console.error("Error al guardar:", error);
            }
        };

        // 5. ELIMINAR
        async function eliminarVinculo(movie_id, person_id) {
            if(!confirm("¿Retirar a esta persona del reparto?")) return;
            try {
                const res = await fetch(`../api/delete_cast.php?movie_id=${movie_id}&person_id=${person_id}`);
                const result = await res.json();
                if(result.status === "success") {
                    cargarTablaCast();
                } else {
                    alert("Error al eliminar");
                }
            } catch (error) {
                console.error("Error al eliminar:", error);
            }
        }

        window.onload = cargarTablaCast;
    </script>
</body>
</html>
